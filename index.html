<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>제휴 문의</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <button id="theme-toggle">🌙 Dark Mode</button>

  <main>
    <h1>제휴 문의</h1>
    <p class="subtitle">함께 성장할 파트너를 찾고 있습니다. 아래 양식을 작성해 주세요.</p>

    <form id="contact-form" action="https://formspree.io/f/xgopwbqw" method="POST">
      <div class="field">
        <label for="name">이름 / 회사명</label>
        <input type="text" id="name" name="name" placeholder="홍길동 / (주)예시" required />
      </div>
      <div class="field">
        <label for="email">이메일</label>
        <input type="email" id="email" name="email" placeholder="example@company.com" required />
      </div>
      <div class="field">
        <label for="phone">연락처 (선택)</label>
        <input type="tel" id="phone" name="phone" placeholder="010-0000-0000" />
      </div>
      <div class="field">
        <label for="type">문의 유형</label>
        <select id="type" name="type" required>
          <option value="" disabled selected>선택해 주세요</option>
          <option value="partnership">비즈니스 제휴</option>
          <option value="marketing">마케팅 협업</option>
          <option value="investment">투자 문의</option>
          <option value="other">기타</option>
        </select>
      </div>
      <div class="field">
        <label for="message">문의 내용</label>
        <textarea id="message" name="message" rows="5" placeholder="제휴 목적과 제안 내용을 자유롭게 작성해 주세요." required></textarea>
      </div>
      <button type="submit" class="submit-btn">문의 보내기</button>
    </form>

    <div id="success-msg" hidden>
      <p>✅ 문의가 접수되었습니다. 빠른 시일 내에 연락드리겠습니다.</p>
    </div>
  </main>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
